name: Phanes DNA Architecture Review

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  review:
    name: Architecture Governance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Phanes DNA
        run: |
          go install github.com/arleyS3/phanes-dna/cmd/phanes-dna@latest || go build -o phanes-dna ./cmd/phanes-dna

      - name: Import DNA Bundle (if present)
        run: |
          if [ -f "project.dna" ]; then
            phanes-dna import project.dna
          fi

      - name: Analyze project AST
        run: phanes-dna analyze .

      - name: Run Architecture Review (CI Mode)
        run: phanes-dna review --ci
